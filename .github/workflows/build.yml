name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}":/home/user/hostcwd \
            --env BUILDOZER_WARN_ON_ROOT=0 \
            kivy/buildozer:1.5.0 \
            bash -c "yes | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
